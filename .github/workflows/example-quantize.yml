name: Quantize Model

# Example workflow: quantize a model after fine-tuning or on-demand
# To use in your own repo, copy this file and customize the model/format/bits

on:
  workflow_dispatch:
    inputs:
      model:
        description: 'HuggingFace model ID (e.g. meta-llama/Llama-3.1-8B-Instruct)'
        required: true
        type: string
      format:
        description: 'Output format'
        required: false
        default: 'gguf'
        type: choice
        options:
          - gguf
          - gptq
          - awq
          - all
      bits:
        description: 'Quantization bits'
        required: false
        default: '4'
        type: choice
        options:
          - '2'
          - '3'
          - '4'
          - '5'
          - '8'
      push_to_hub:
        description: 'HuggingFace repo to push to (e.g. user/model-GGUF). Leave empty to skip.'
        required: false
        default: ''
        type: string

jobs:
  quantize:
    runs-on: ubuntu-latest
    # For GPU quantization (GPTQ/AWQ), use a GPU runner:
    # runs-on: [self-hosted, gpu]
    steps:
      - uses: actions/checkout@v4

      - name: Quantize model
        uses: ShipItAndPray/turboquant@master
        with:
          model: ${{ inputs.model }}
          format: ${{ inputs.format }}
          bits: ${{ inputs.bits }}
          push-to-hub: ${{ inputs.push_to_hub }}
          eval: 'true'
          hf-token: ${{ secrets.HF_TOKEN }}
